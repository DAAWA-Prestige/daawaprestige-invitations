<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mariage Standard</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
#musicBtn{
display:none;
position:fixed;
bottom:80px;
right:20px;
width:35px;
height:35px;
align-items:center;
justify-content:center;
border:none;
border-radius:50%;
background:rgba(178,139,103,0.9);
color:white;
font-size:16px;
line-height:1;
cursor:pointer;
z-index:9999;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
padding:0;
}
}
body{
margin:0;
font-family:Georgia,serif;
background:#f8f4ef;
color:#2c2c2c;
text-align:center;
}

.envelope-screen{
height:100vh;
width:100vw;
overflow:hidden;
cursor:pointer;
position:relative;
}

.envelope{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;
display:block;
}

.message{
position:absolute;
bottom:250px;
left:50%;
transform:translateX(-50%);

padding:12px 28px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.30);
border-radius:999px;

color:white;

font-family:"Cormorant Garamond", serif;
font-size:18px;
font-weight:600;

letter-spacing:1px;
white-space:nowrap;

box-shadow:0 8px 30px rgba(0,0,0,0.15);

animation:pulse 2s infinite;
}
@keyframes pulse{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.05);}
100%{transform:translateX(-50%) scale(1);}
}

#videoScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

#openingVideo{
width:100%;
height:100%;
object-fit:cover;
}

.invitation{
display:none;
padding:40px 20px;
}

.hero{
padding:80px 20px;
background:#e7ddd1;
}

.hero h1{
font-size:52px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

.countdown{
padding:50px 20px;
font-size:32px;
font-weight:bold;
}

.section{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.map-btn{
display:inline-block;
padding:15px 25px;
background:#b28b67;
color:white;
text-decoration:none;
border-radius:30px;
margin-top:20px;
}

footer{
padding:40px;
background:white;
margin-top:40px;
}

@media (min-width: 768px){
  .message{
    font-size:45px;
    padding:16px 42px;
    bottom:180px;
  }

  #musicBtn{
    width:105px;
    height:105px;
    font-size:38px;
    bottom:150px;
    right:40px;
  }
}
</style>
</head>

<body>

<div class="envelope-screen" onclick="openInvitation()">
<img class="envelope" src="enveloppe.png" alt="Enveloppe invitation">

<div class="message">
Cliquez pour ouvrir
</div>
</div>

<div id="videoScreen">
<video id="openingVideo" playsinline>
<source src="ouverture.mp4" type="video/mp4">
</video>
</div>

<button id="musicBtn" onclick="toggleMusic()">
🎵
</button>
<div class="invitation" id="invitation">

<section class="hero">
<h1>Anis & Maram</h1>
<p>17 Septembre 2026</p>
</section>

<section class="countdown">
<div id="countdown"></div>
</section>

<section class="section">
<h2>Détails de la journée</h2>

<p>
Salle des fêtes Hôtel El Aurassi
<br><br>
Alger Centre
<br><br>
17 Septembre 2026
<br><br>
À partir de 17h
</p>

<a class="map-btn" href="https://maps.google.com" target="_blank">
Ouvrir Google Maps
</a>
</section>

<footer>
Daawa Prestige
</footer>

</div>

<script>
function openInvitation(){
  
const music=document.getElementById("bgMusic");
music.volume=0.25;
music.play();

document.getElementById("musicBtn").style.display="flex";
document.querySelector(".envelope-screen").style.display="none";
document.getElementById("videoScreen").style.display="block";

const video=document.getElementById("openingVideo");
video.play();

video.onended=function(){

document.getElementById("videoScreen").style.display="none";

document.getElementById("invitation").style.display="block";
document.getElementById("musicBtn").style.display="block";

const music=document.getElementById("bgMusic");
music.volume=0.25;
music.play();
};
}
function toggleMusic(){

const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

if(music.paused){

music.play();
btn.innerHTML="🎵";

}else{

music.pause();
btn.innerHTML="🔇";

}


}
const targetDate=new Date("September 17, 2026 17:00:00").getTime();

setInterval(function(){
const now=new Date().getTime();
const distance=targetDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"j "+hours+"h "+minutes+"m "+seconds+"s";
},1000);

  document.addEventListener("visibilitychange", function(){

const music = document.getElementById("bgMusic");

if(document.hidden){

music.pause();

}else{

music.play();

}

});
</script>

  <audio id="bgMusic" loop>
  <source src="musique.mp3" type="audio/mpeg">
</audio>
  
</body>
</html>
