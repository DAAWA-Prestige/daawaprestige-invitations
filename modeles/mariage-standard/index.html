<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mariage Standard</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
html, body{
margin:0;
padding:0;
width:100%;
min-height:100%;
overflow-x:hidden;
}

body{
font-family:Georgia,serif;
background:#1f2b23;
color:#f8ead2;
text-align:center;
}

#musicBtn{
display:none;
position:fixed;
bottom:80px;
right:20px;
width:35px;
height:35px;
align-items:center;
justify-content:center;
border:none;
border-radius:50%;
background:rgba(178,139,103,0.9);
color:white;
font-size:16px;
line-height:1;
cursor:pointer;
z-index:9999;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
padding:0;
}

.envelope-screen{
height:100vh;
width:100vw;
overflow:hidden;
cursor:pointer;
position:relative;
}

.envelope{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.message{
position:absolute;
bottom:250px;
left:50%;
transform:translateX(-50%);
padding:12px 28px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.30);
border-radius:999px;
color:white;
font-family:"Cormorant Garamond", serif;
font-size:18px;
font-weight:600;
letter-spacing:1px;
white-space:nowrap;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.05);}
100%{transform:translateX(-50%) scale(1);}
}

#videoScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

#openingVideo{
width:100%;
height:100%;
object-fit:cover;
}

.invitation{
display:none;
min-height:100vh;
padding:0;
margin:0;
background-image:url("Fond.jpg");
background-size:cover;
background-position:center top;
background-repeat:no-repeat;
background-attachment:fixed;
color:#f8ead2;
}

.hero,
.countdown,
.section,
footer{
background:transparent;
color:#f8ead2;
}

.hero{
padding:90px 20px 40px;
}

.hero h1{
font-family:"Cormorant Garamond", serif;
font-size:52px;
margin-bottom:10px;
color:#f8ead2;
}

.hero p{
font-size:20px;
color:#f8ead2;
}

.countdown{
padding:45px 20px;
font-size:32px;
font-weight:bold;
color:#f8ead2;
}

.section{
max-width:760px;
margin:40px auto;
padding:60px 20px;
color:#f8ead2;
}

.section h2{
font-family:"Cormorant Garamond", serif;
font-size:36px;
margin-bottom:25px;
}

.section p{
font-size:18px;
line-height:1.8;
}

.map-btn{
display:inline-block;
padding:15px 25px;
background:#b28b67;
color:white;
text-decoration:none;
border-radius:30px;
margin-top:20px;
}

footer{
padding:30px;
margin:0;
font-size:16px;
color:#f8ead2;
}

@media (min-width: 900px){
  .invitation{
    max-width:430px;
    margin:0 auto;
    background-size:cover;
    box-shadow:0 0 40px rgba(0,0,0,0.25);
  }

  .message{
    font-size:28px;
    padding:16px 42px;
    bottom:180px;
  }

  #musicBtn{
    width:48px;
    height:48px;
    font-size:22px;
    bottom:60px;
    right:40px;
  }
}

@media (max-width: 600px){
  .hero h1{
    font-size:42px;
  }

  .countdown{
    font-size:26px;
  }

  .section h2{
    font-size:30px;
  }

  .section p{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="envelope-screen" onclick="openInvitation()">
<img class="envelope" src="enveloppe.png" alt="Enveloppe invitation">

<div class="message">
Cliquez pour ouvrir
</div>
</div>

<div id="videoScreen">
<video id="openingVideo" playsinline>
<source src="ouverture.mp4" type="video/mp4">
</video>
</div>

<button id="musicBtn" onclick="toggleMusic()">
🎵
</button>

<div class="invitation" id="invitation">

<section class="hero">
<h1>Anis & Maram</h1>
<p>17 Septembre 2026</p>
</section>

<section class="countdown">
<div id="countdown"></div>
</section>

<section class="section">
<h2>Détails de la journée</h2>

<p>
Salle des fêtes Hôtel El Aurassi
<br><br>
Alger Centre
<br><br>
17 Septembre 2026
<br><br>
À partir de 17h
</p>

<a class="map-btn" href="https://maps.google.com" target="_blank">
Ouvrir Google Maps
</a>
</section>

<footer>
Daawa Prestige
</footer>

</div>

<script>
function openInvitation(){
const music=document.getElementById("bgMusic");
music.volume=0.25;
music.play();

document.getElementById("musicBtn").style.display="flex";
document.querySelector(".envelope-screen").style.display="none";
document.getElementById("videoScreen").style.display="block";

const video=document.getElementById("openingVideo");
video.play();

video.onended=function(){
document.getElementById("videoScreen").style.display="none";
document.getElementById("invitation").style.display="block";
document.getElementById("musicBtn").style.display="flex";
};
}

function toggleMusic(){
const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

if(music.paused){
music.play();
btn.innerHTML="🎵";
}else{
music.pause();
btn.innerHTML="🔇";
}
}

const targetDate=new Date("September 17, 2026 17:00:00").getTime();

setInterval(function(){
const now=new Date().getTime();
const distance=targetDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"j "+hours+"h "+minutes+"m "+seconds+"s";
},1000);

document.addEventListener("visibilitychange", function(){
const music=document.getElementById("bgMusic");

if(document.hidden){
music.pause();
}else{
music.play();
}
});
</script>

<audio id="bgMusic" loop>
<source src="musique.mp3" type="audio/mpeg">
</audio>

</body>
</html>
